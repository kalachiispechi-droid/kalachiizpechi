<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калачи из печи | Магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f1e7;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 Q 30 5, 50 10 T 90 10" stroke="%23d4b89c" stroke-width="0.5" fill="none" opacity="0.3"/><path d="M5 30 Q 25 25, 45 30 T 85 30" stroke="%23d4b89c" stroke-width="0.5" fill="none" opacity="0.3"/><path d="M20 70 Q 40 65, 60 70 T 95 70" stroke="%23d4b89c" stroke-width="0.5" fill="none" opacity="0.3"/></svg>');
            color: #3e2c1b;
        }

        /* Шапка */
        .header {
            background: #6b3f2b;
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            font-family: 'Georgia', serif;
            margin-bottom: 10px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .nav button {
            background: #d4a373;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .nav button:hover {
            background: #b3825e;
            transform: scale(1.05);
        }

        .nav button.active {
            background: #b3825e;
            border-color: #ffd966;
        }

        .admin-btn {
            background: #2c3e50 !important;
        }

        .cart-btn {
            background: #27ae60 !important;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        /* Поиск */
        .search-section {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-section input {
            width: 100%;
            padding: 15px;
            border: 2px solid #d4a373;
            border-radius: 50px;
            font-size: 1.1rem;
            outline: none;
        }

        /* Каталог */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }

        .product-image {
            height: 200px;
            background: linear-gradient(135deg, #f7e5cd, #dab48c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
        }

        .product-category {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(107, 63, 43, 0.8);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 1.5rem;
            color: #5e3a22;
            margin-bottom: 10px;
        }

        .product-desc {
            color: #7e5a41;
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .product-price {
            font-size: 1.8rem;
            color: #99582a;
            font-weight: bold;
            margin: 15px 0;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-to-cart {
            flex: 2;
            background: #d4a373;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            background: #b3825e;
        }

        .admin-edit {
            flex: 1;
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .admin-delete {
            flex: 1;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* Корзина */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-item-emoji {
            font-size: 2rem;
        }

        .cart-item-remove {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-total {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
            text-align: right;
        }

        .close-cart {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }

        /* Админ-панель */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .admin-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .admin-login {
            display: block;
        }

        .admin-panel {
            display: none;
        }

        .admin-login input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #d4a373;
            border-radius: 10px;
            font-size: 1rem;
        }

        .admin-login button {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .admin-form {
            display: grid;
            gap: 15px;
        }

        .admin-form input,
        .admin-form select,
        .admin-form textarea {
            padding: 12px;
            border: 2px solid #d4a373;
            border-radius: 10px;
            font-size: 1rem;
        }

        .admin-form button {
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .close-admin {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Категории */
        .category-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .category-btn {
            padding: 15px;
            border: 2px solid #d4a373;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .category-btn:hover,
        .category-btn.active {
            background: #d4a373;
            color: white;
        }

        /* Эмодзи-выбор */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 10px 0;
        }

        .emoji-option {
            font-size: 2rem;
            padding: 10px;
            border: 2px solid #d4a373;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            background: white;
        }

        .emoji-option:hover,
        .emoji-option.selected {
            background: #d4a373;
        }

        /* Информация */
        .info-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 3000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🥖 Калачи из печи 🥨</h1>
        <div class="nav">
            <button class="active" onclick="filterCategory('all')">Все товары</button>
            <button onclick="filterCategory('Хлеб')">Хлеб 🍞</button>
            <button onclick="filterCategory('Булочки')">Булочки 🥐</button>
            <button onclick="filterCategory('Пирожки')">Пирожки 🥟</button>
            <button onclick="filterCategory('Печенье')">Печенье 🍪</button>
            <button class="cart-btn" onclick="openCart()">
                🛒 Корзина
                <span class="cart-count" id="cartCount">0</span>
            </button>
            <button class="admin-btn" onclick="openAdmin()">👤 Админ</button>
        </div>
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." onkeyup="searchProducts()">
        </div>
    </div>

    <div class="container">
        <div id="categoryButtons" class="category-selector">
            <!-- Категории будут добавляться динамически -->
        </div>
        <div id="productGrid" class="product-grid">
            <!-- Товары будут загружаться сюда -->
        </div>
    </div>

    <!-- Корзина -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <h2>🛒 Ваша корзина</h2>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
            <button class="close-cart" onclick="closeCart()">Закрыть</button>
            <button style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-left: 10px;" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <!-- Админ-панель -->
    <div id="adminModal" class="admin-modal">
        <div class="admin-content">
            <div id="adminLogin" class="admin-login">
                <h2>👤 Вход для администратора</h2>
                <input type="text" id="adminUsername" placeholder="Логин">
                <input type="password" id="adminPassword" placeholder="Пароль">
                <button onclick="adminLogin()">Войти</button>
            </div>
            <div id="adminPanel" class="admin-panel">
                <h2>🛠 Управление товарами</h2>
                <div class="admin-form">
                    <input type="text" id="productName" placeholder="Название товара">
                    <select id="productCategory">
                        <option value="Хлеб">Хлеб 🍞</option>
                        <option value="Булочки">Булочки 🥐</option>
                        <option value="Пирожки">Пирожки 🥟</option>
                        <option value="Печенье">Печенье 🍪</option>
                        <option value="Пироги">Пироги 🥧</option>
                        <option value="Сдоба">Сдоба 🥨</option>
                    </select>
                    <textarea id="productDesc" placeholder="Описание товара" rows="3"></textarea>
                    <input type="number" id="productPrice" placeholder="Цена (₽)">
                    
                    <label>Выберите эмодзи:</label>
                    <div class="emoji-grid">
                        <div class="emoji-option" onclick="selectEmoji('🍞')">🍞</div>
                        <div class="emoji-option" onclick="selectEmoji('🥖')">🥖</div>
                        <div class="emoji-option" onclick="selectEmoji('🥐')">🥐</div>
                        <div class="emoji-option" onclick="selectEmoji('🥨')">🥨</div>
                        <div class="emoji-option" onclick="selectEmoji('🥟')">🥟</div>
                        <div class="emoji-option" onclick="selectEmoji('🥧')">🥧</div>
                        <div class="emoji-option" onclick="selectEmoji('🍪')">🍪</div>
                        <div class="emoji-option" onclick="selectEmoji('🍰')">🍰</div>
                        <div class="emoji-option" onclick="selectEmoji('🥮')">🥮</div>
                        <div class="emoji-option" onclick="selectEmoji('🍩')">🍩</div>
                    </div>
                    <input type="hidden" id="productEmoji" value="🍞">
                    
                    <button onclick="saveProduct()">➕ Добавить товар</button>
                    <button class="close-admin" onclick="closeAdmin()">Закрыть панель</button>
                </div>
                <div style="margin-top: 20px; max-height: 300px; overflow-y: auto;">
                    <h3>Существующие товары:</h3>
                    <div id="adminProductList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoMessage" class="info-message"></div>

    <script>
        // Данные
        let products = [];
        let cart = [];
        let currentCategory = 'all';
        let currentEmoji = '🍞';
        let editingId = null;

        // Логин/пароль админа
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'pekar2025';

        // Загрузка данных из localStorage
        function loadProducts() {
            const saved = localStorage.getItem('bakeryProducts');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                // Начальные товары (пусто, если хочешь полностью пустой каталог)
                products = [];
            }
            renderProducts();
            renderAdminProductList();
        }

        // Сохранение в localStorage
        function saveProducts() {
            localStorage.setItem('bakeryProducts', JSON.stringify(products));
            renderProducts();
            renderAdminProductList();
        }

        // Рендер товаров
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            let filtered = products;

            // Фильтр по категории
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }

            // Поиск
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) || 
                    p.description.toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 50px; font-size: 1.5rem;">🥖 Товаров пока нет. Войдите как админ, чтобы добавить!</div>';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-image">
                        <span>${p.emoji || '🥖'}</span>
                        <span class="product-category">${p.category}</span>
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${p.name}</h3>
                        <p class="product-desc">${p.description}</p>
                        <div class="product-price">${p.price} ₽</div>
                        <div class="product-actions">
                            <button class="add-to-cart" onclick="addToCart(${p.id})">В корзину</button>
                            ${isAdminLoggedIn() ? `
                                <button class="admin-edit" onclick="editProduct(${p.id})">✏️</button>
                                <button class="admin-delete" onclick="deleteProduct(${p.id})">🗑️</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Фильтр по категории
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        }

        // Поиск
        function searchProducts() {
            renderProducts();
        }

        // Выбор эмодзи
        function selectEmoji(emoji) {
            currentEmoji = emoji;
            document.querySelectorAll('.emoji-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById('productEmoji').value = emoji;
        }

        // Корзина
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            updateCartCount();
            showMessage('Товар добавлен в корзину!');
        }

        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }

        function openCart() {
            const modal = document.getElementById('cartModal');
            const cartItems = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p>Корзина пуста</p>';
            } else {
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <span class="cart-item-emoji">${item.emoji}</span>
                            <div>
                                <div>${item.name}</div>
                                <div>${item.price} ₽</div>
                            </div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">Удалить</button>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').textContent = `Итого: ${total} ₽`;
            
            modal.style.display = 'flex';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            openCart(); // Обновить отображение
        }

        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function checkout() {
            alert('Спасибо за заказ! В ближайшее время мы свяжемся с вами.');
            cart = [];
            updateCartCount();
            closeCart();
        }

        // Админка
        function openAdmin() {
            document.getElementById('adminModal').style.display = 'flex';
            if (isAdminLoggedIn()) {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                document.getElementById('adminLogin').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
            }
        }

        function closeAdmin() {
            document.getElementById('adminModal').style.display = 'none';
            clearAdminForm();
        }

        function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                renderAdminProductList();
                renderProducts(); // Перерендерить, чтобы показать кнопки редактирования
                showMessage('Добро пожаловать, администратор!');
            } else {
                alert('Неверный логин или пароль!');
            }
        }

        function adminLogout() {
            sessionStorage.removeItem('adminLoggedIn');
            closeAdmin();
            renderProducts();
        }

        function isAdminLoggedIn() {
            return sessionStorage.getItem('adminLoggedIn') === 'true';
        }

        function saveProduct() {
            const name = document.getElementById('productName').value;
            const category = document.getElementById('productCategory').value;
            const description = document.getElementById('productDesc').value;
            const price = parseInt(document.getElementById('productPrice').value);
            const emoji = document.getElementById('productEmoji').value;

            if (!name || !category || !description || !price) {
                alert('Заполните все поля!');
                return;
            }

            if (editingId) {
                // Редактирование
                const index = products.findIndex(p => p.id === editingId);
                products[index] = {
                    ...products[index],
                    name, category, description, price, emoji
                };
                showMessage('Товар обновлен!');
                editingId = null;
            } else {
                // Новый товар
                const newProduct = {
                    id: Date.now(),
                    name, category, description, price, emoji
                };
                products.push(newProduct);
                showMessage('Товар добавлен!');
            }

            saveProducts();
            clearAdminForm();
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            editingId = id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productDesc').value = product.description;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productEmoji').value = product.emoji;
            currentEmoji = product.emoji;
            
            // Подсветить выбранный эмодзи
            document.querySelectorAll('.emoji-option').forEach(opt => {
                if (opt.textContent === product.emoji) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });

            openAdmin();
        }

        function deleteProduct(id) {
            if (confirm('Удалить товар?')) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                renderAdminProductList();
                showMessage('Товар удален');
            }
        }

        function renderAdminProductList() {
            const list = document.getElementById('adminProductList');
            list.innerHTML = products.map(p => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
                    <span>${p.emoji} ${p.name} - ${p.price}₽</span>
                    <div>
                        <button onclick="editProduct(${p.id})" style="background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-right: 5px;">✏️</button>
                        <button onclick="deleteProduct(${p.id})" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px;">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function clearAdminForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productCategory').value = 'Хлеб';
            document.getElementById('productDesc').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productEmoji').value = '🍞';
            currentEmoji = '🍞';
            document.querySelectorAll('.emoji-option').forEach(opt => opt.classList.remove('selected'));
            editingId = null;
        }

        function showMessage(text) {
            const msg = document.getElementById('infoMessage');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        // Инициализация
        loadProducts();
        updateCartCount();
    </script>
</body>
</html>
